# Validator Monitor Configuration

# Beacon Node API endpoint
# For local kurtosis / devnet use your local HTTP port, e.g.:
beacon_node_url: "http://127.0.0.1:60206"

# Optional API key (leave empty for local nodes)
beacon_api_key: ""

# List of validator indices to monitor
validators:
  - 3

# Polling interval in slots (1 slot = 12 seconds)
polling_interval_slots: 1
slot_duration_seconds: 2

# Number of concurrent workers
worker_pool_size: 2

# Rate limiting configuration
rate_limit:
  # Tweak depending on your beacon node / provider
  requests_per_second: 100
  burst: 50

# HTTP client configuration
http:
  timeout_seconds: 30
  max_idle_conns: 100

# Select database backend: "scylladb" or "postgres"
database_driver: "postgres"

# ScyllaDB configuration
scylladb:
  hosts:
    - "127.0.0.1:9042"
  keyspace: "validator_monitor"
  replication_factor: 3
  consistency: "local_quorum"
  timeout_seconds: 10
  max_retries: 3
  ttl_days: 90

# PostgreSQL configuration
postgres:
  host: "127.0.0.1"
  port: 5432
  user: "pauli"
  password: "pauli"
  database: "validator_monitor"
  ssl_mode: "disable"
  max_conns: 10
  ttl_days: 90
