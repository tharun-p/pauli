# =============================================================================
# Pauli - Ethereum Validator Monitor
# Sample Configuration File
# =============================================================================
# Copy this file to config.yaml and customize for your environment.
# All durations are in seconds unless otherwise noted.
# =============================================================================

# -----------------------------------------------------------------------------
# BEACON NODE
# -----------------------------------------------------------------------------
# URL of your Beacon Node's REST API
# Common ports: Lighthouse (5052), Prysm (3500), Teku (5051), Nimbus (5052)
# For providers like Tatum: "https://ethereum-mainnet.gateway.tatum.io"
beacon_node_url: "http://localhost:5052"

# Optional: API key for providers that require authentication (e.g., Tatum)
# Leave empty if not needed
beacon_api_key: ""

# -----------------------------------------------------------------------------
# EXECUTION NODE (optional)
# -----------------------------------------------------------------------------
# JSON-RPC HTTP endpoint (e.g. Geth/Erigon on 8545). When set, priority (tip) fees
# are summed from execution payloads for blocks your validators propose.
# Uses eth_getBlockByNumber and eth_getBlockReceipts (full receipts).
execution_node_url: ""
# Required when your execution_node_url is behind an authenticated proxy (common with
# Kurtosis / ethpandaops ethereum-package: the published "rpc" port is not bare Geth).
execution_api_key: ""
# bearer | x_api_key | authorization | token | none (none = never send auth headers; use for bare Geth JSON-RPC)
execution_auth_header: ""

# -----------------------------------------------------------------------------
# VALIDATORS
# -----------------------------------------------------------------------------
# Optional: validator indices for UI/API filtering (not used for beacon RPC).
# Network-wide epoch indexing stores all validators; leave empty to index everyone.
validators: []
# validators:
#   - 123456

# -----------------------------------------------------------------------------
# POLLING
# -----------------------------------------------------------------------------
# How often the realtime runner polls head (in slots). Default 32 = once per epoch.
# 1 slot = 12 seconds on mainnet
polling_interval_slots: 32

# -----------------------------------------------------------------------------
# WORKER POOL
# -----------------------------------------------------------------------------
# Number of concurrent workers for API requests
# Recommended: 10 for <100 validators, 20-50 for 100+ validators
# Higher values = faster polling, but more load on beacon node
worker_pool_size: 10

# -----------------------------------------------------------------------------
# BACKFILL (optional)
# -----------------------------------------------------------------------------
# Always-on historical catch-up alongside realtime: all slots (blocks/sync/proposer)
# and all epochs (validator balances + attestation rewards). Uses indexer_progress
# in Postgres; tune slots_per_pass / worker_pool_size to avoid starving realtime.
# backfill:
#   enabled: true
#   start_slot: 0
#   start_epoch: 0
#   lag_behind_head: 4
#   slots_per_pass: 8
#   epochs_per_pass: 2
#   poll_delay_ms: 100
#   idle_poll_delay_ms: 12000

# -----------------------------------------------------------------------------
# RATE LIMITING
# -----------------------------------------------------------------------------
# Prevents overwhelming the beacon node with requests
rate_limit:
  # Maximum requests per second (token bucket rate)
  # 1 request per slot = 1 request per 12 seconds = 0.083 req/s
  # Tatum API: 3 requests/second (allows up to 36 requests per slot if needed)
  # Public nodes: Usually 50-100 requests/second
  # Self-hosted: Can be much higher
  requests_per_second: 0.083  # Conservative: 1 request per slot
  
  # Maximum burst size (token bucket capacity)
  # Allows short bursts above the rate limit
  # For 1 request per slot: burst = 1 (no burst, strict 1 req/slot)
  # For more lenient limits, can be 2-3x the requests_per_second
  burst: 1

# -----------------------------------------------------------------------------
# HTTP CLIENT
# -----------------------------------------------------------------------------
http:
  # Request timeout in seconds
  # Increase if beacon node is slow or remote
  timeout_seconds: 30
  
  # Maximum idle connections to keep open
  # Higher values improve performance for many validators
  max_idle_conns: 100

  # Retries for beacon HTTP requests (timeouts, 429, 503, etc.)
  max_retries: 3

# -----------------------------------------------------------------------------
# DATABASE (PostgreSQL)
# -----------------------------------------------------------------------------
# Optional; defaults to postgres when omitted.
database_driver: "postgres"

postgres:
  host: "127.0.0.1"
  port: 5432
  user: "pauli"
  password: "pauli"
  database: "validator_monitor"
  ssl_mode: "disable"
  max_conns: 10
  ttl_days: 90


# =============================================================================
# ENVIRONMENT-SPECIFIC EXAMPLES
# =============================================================================

# -----------------------------------------------------------------------------
# DEVELOPMENT / LOCAL TESTING
# -----------------------------------------------------------------------------
# Uncomment and modify for local development:
#
# beacon_node_url: "http://localhost:5052"
# validators: [1, 2, 3]
# polling_interval_slots: 32  # Once per epoch
# worker_pool_size: 2
# rate_limit:
#   requests_per_second: 10
#   burst: 20
# postgres:
#   host: "127.0.0.1"
#   port: 5432
#   user: "pauli"
#   password: "pauli"
#   database: "validator_monitor_dev"
#   ttl_days: 7

# -----------------------------------------------------------------------------
# PRODUCTION / HIGH AVAILABILITY
# -----------------------------------------------------------------------------
# Uncomment and modify for production:
#
# beacon_node_url: "http://beacon-node.internal:5052"
# validators:
#   - 100000
#   - 100001
#   # ... (your production validators)
# polling_interval_slots: 1
# worker_pool_size: 50
# rate_limit:
#   requests_per_second: 100
#   burst: 200
# http:
#   timeout_seconds: 60
#   max_idle_conns: 200
#   max_retries: 5
# postgres:
#   host: "postgres.internal"
#   port: 5432
#   user: "pauli"
#   password: "..."
#   database: "validator_monitor_prod"
#   ssl_mode: "require"
#   max_conns: 25
#   ttl_days: 365  # 1 year retention

